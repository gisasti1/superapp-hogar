name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # ─── Typecheck (corre rápido, falla rápido) ──────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @superapp/database db:generate
      - run: pnpm --filter @superapp/shared build
      - run: pnpm --filter @superapp/database build
      - run: pnpm -r typecheck

  # ─── Tests unitarios (mockean DB; no necesitan Postgres real) ────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @superapp/database db:generate
      - run: pnpm --filter @superapp/shared build
      - run: pnpm --filter @superapp/database build
      - run: pnpm --filter @superapp/api test

  # ─── Build (api + web + packages) ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @superapp/database db:generate
      - run: pnpm build

  # ─── Docker images build (verifica que los Dockerfiles compilen) ─────────────
  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t superapp-api:ci -f apps/api/Dockerfile .
      - name: Build Web image
        run: docker build -t superapp-web:ci -f apps/web/Dockerfile .
