# Docker Compose para PRODUCCIÓN local — single-host con Postgres incluido.
# Para Railway/Fly/AWS típicamente sólo deployás los containers de api+web y usás
# una DB managed (Neon/Supabase/RDS).
#
# Uso:
#   1) Copiá .env.prod.example a .env.prod y completá los secretos
#   2) docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   3) docker compose -f docker-compose.prod.yml exec api node -e "..." # para correr migrations

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-superapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-superapp_hogar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-superapp}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-superapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-superapp_hogar}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_ORIGINS: ${WEB_URL:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      # Integradores externos (opcionales — sin esto corre en mock)
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      RENAPER_API_KEY: ${RENAPER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    ports:
      - '${API_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:4000}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api

volumes:
  postgres_data:
